name: Build macOS (Apple Silicon)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: macos-14 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive 

    - name: Install Build Tools
      run: |
        brew install cmake ninja

    - name: Execute Custom Dependency Scripts
      run: |
        bash scripts/build-eigen || echo "No custom dependency script needed"

    - name: Patch legacy CMake policies in submodules
      run: |
        # macOS uses BSD sed, which requires the empty string '' after -i
        # This replaces the forbidden OLD policy with the required NEW policy in the glfw submodule
        sed -i '' 's/cmake_policy(SET CMP0042 OLD)/cmake_policy(SET CMP0042 NEW)/g' ext/nanogui/ext/glfw/CMakeLists.txt
        
        # Optional: Apply globally just in case other submodules have it
        find . -name "CMakeLists.txt" -type f -exec sed -i '' 's/cmake_policy(SET CMP0042 OLD)/cmake_policy(SET CMP0042 NEW)/g' {} +

    - name: Configure CMake for Apple Silicon
      run: |
        mkdir build
        cd build
        # Added -Wno-dev to suppress CMP0175 and other developer warnings
        cmake .. -G Ninja -Wno-dev \
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="arm64" \
          -DCMAKE_CXX_FLAGS="-mcpu=apple-m1 -mtune=apple-m1" \
          -DCMAKE_C_FLAGS="-mcpu=apple-m1 -mtune=apple-m1"

    - name: Build Application
      run: |
        cd build
        ninja

    - name: Package Artifact
      run: |
        mkdir -p artifact
        cd build
        zip -r ../artifact/instant-meshes-macos-arm64.zip "Instant Meshes.app" || zip -r ../artifact/instant-meshes-macos-arm64.zip *
        
    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: instant-meshes-macos-arm64
        path: artifact/instant-meshes-macos-arm64.zip
        retention-days: 7
